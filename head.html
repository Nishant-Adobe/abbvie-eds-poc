<meta name="viewport" content="width=device-width, initial-scale=1"/>
<script>
    const _path = window.location.pathname.toLowerCase();
    const _subBrands = ['rinvoq-hcp', 'rinvoq-dtc', 'skyrizi-hcp', 'skyrizi-dtc', 'botox', 'linzess', 'venclexta', 'mavyret'];
    const brandCode = [...document.head.querySelectorAll(`meta[name="brand"]`)]
      .map((m) => m.content)
      .join(', ')
      || _subBrands.find((b) => _path.includes(b))
      || (_path.includes('rinvoq') ? 'rinvoq-hcp' : '')
      || (_path.includes('skyrizi') ? 'skyrizi-hcp' : '')
      || '';
    const themeCode = [...document.head.querySelectorAll(`meta[name="theme"]`)]
      .map((m) => m.content)
      .join(', ');
    const brandPath = `${(brandCode !== '') ? `${brandCode}/` : ''}`;
    const themePath = `${(themeCode !== '') ? `themes/${themeCode}/` : ''}`;
    // load tokens and styles
    const stylesheets = [
      `/styles/${brandPath}${themePath}tokens.css`,
      `/styles/${brandPath}${themePath}styles.css`
    ];
    stylesheets.forEach(stylesheet => {
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = stylesheet;
      link.type = "text/css";
      document.head.appendChild(link);
    });
</script>
<script src="/scripts/aem.js" type="module"></script>
<script src="/scripts/scripts.js" type="module"></script>
<link rel="stylesheet" href="/styles/styles.css"/>
